<!DOCTYPE html>
<html lang="es" dir="ltr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Mundial 2026 — lite</title>
<style>
  :root{
    --card:#0e2a1c;
    --border:rgba(210,235,220,.09);
    --text:#f2f7f4;
    --muted:#9fb8ac;
    --gold:#e9bf3f;
    --gold-text:#2a2107;
    --live:#e0473f;
    --font:system-ui,-apple-system,"Segoe UI",Roboto,sans-serif;
    --mono:ui-monospace,"Chakra Petch",monospace;

    /* layout offsets — matches where the old overlay widget was docked */
    --xat-nav: 62px;
    --xat-right: 14px;
    --pw: clamp(180px, 18vw, 240px);
  }
  *{box-sizing:border-box}
  html,body{margin:0;background:transparent;color:var(--text);font-family:var(--font)}

  /* ── single unified panel — sized/positioned like the reference overlay ── */
  #app{
    position:fixed;
    top:calc(var(--xat-nav) + 4px);
    right:var(--xat-right);
    width:var(--pw);
    max-height:min(460px, calc(100vh - var(--xat-nav) - 40px));
    display:flex;
    flex-direction:column;
    background:linear-gradient(175deg,#0c1f15 0%,#091810 55%,#070f0a 100%);
    border:1px solid rgba(0,104,71,.55);
    border-radius:16px;
    overflow:hidden;
    box-shadow:0 20px 50px rgba(0,0,0,.5);
  }
  .topbar{height:4px;flex:0 0 auto;background:linear-gradient(90deg,#046a38 0 33.33%,#ffffff 33.33% 66.66%,#ce1126 66.66% 100%)}
  .tabs{display:flex;gap:6px;padding:8px 8px 6px;flex:0 0 auto}
  .tab{flex:1;display:flex;align-items:center;justify-content:center;gap:6px;padding:7px 6px;border-radius:10px;border:1px solid var(--border);font-weight:800;font-size:.66rem;letter-spacing:.02em;cursor:pointer;background:rgba(0,40,20,.4);color:var(--muted);transition:background .15s,color .15s,box-shadow .15s}
  .tab.active{background:linear-gradient(135deg,#1c5c3c,#124a30);color:#eafff2;box-shadow:0 2px 10px rgba(20,120,70,.4)}
  .dot-live{width:7px;height:7px;border-radius:50%;background:var(--live);box-shadow:0 0 0 0 rgba(224,71,63,.6);animation:pulse 1.6s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(224,71,63,.55)}70%{box-shadow:0 0 0 7px rgba(224,71,63,0)}100%{box-shadow:0 0 0 0 rgba(224,71,63,0)}}

  /* ── list: one continuous scroll area inside the single panel ── */
  .list{flex:1 1 auto;overflow-y:auto;display:flex;flex-direction:column;padding:2px 8px 8px}
  .list::-webkit-scrollbar{width:4px}
  .list::-webkit-scrollbar-thumb{background:rgba(0,163,108,.5);border-radius:10px}
  .list::-webkit-scrollbar-track{background:transparent}

  /* ── match row: a divider line, not a separate floating card ── */
  .match{padding:8px 2px;border-bottom:1px solid rgba(255,255,255,.06)}
  .match:last-child{border-bottom:none}
  .match.live{background:rgba(224,71,63,.06)}
  .row{display:grid;grid-template-columns:1fr auto 1fr;align-items:start;gap:4px}
  /* Team block: flag stacked above the country code, centered */
  .team{display:flex;flex-direction:column;align-items:center;justify-content:flex-start;gap:4px;font-weight:800;font-size:.68rem;min-width:0}
  .team.away{align-items:center}
  .team span{overflow:hidden;text-overflow:ellipsis;white-space:nowrap;max-width:100%;text-align:center}
  /* Flag circle: image is zoomed/cropped to fully cover the circle, no letterboxing */
  .flag{position:relative;width:26px;height:26px;border-radius:50%;overflow:hidden;flex:0 0 auto;background:#0004;box-shadow:0 0 0 1px rgba(255,255,255,.06)}
  .flag img{position:absolute;top:50%;left:50%;width:190%;height:190%;transform:translate(-50%,-50%);object-fit:cover}
  .flag .emoji-fallback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:22px;line-height:1;transform:scale(1.05,1.7)}
  .mid{text-align:center;display:flex;flex-direction:column;align-items:center;gap:3px;min-width:56px;padding-top:2px}
  .score{font-family:var(--mono);font-weight:800;font-size:1.1rem;color:var(--gold);letter-spacing:.02em}
  .score.live-score{color:#fff}
  .ko{font-family:var(--mono);font-weight:700;font-size:.82rem;color:#d9f2e5}
  .cd{font-family:var(--mono);font-size:.6rem;font-weight:700;color:var(--gold);letter-spacing:.01em}
  .pill{font-family:var(--mono);font-weight:800;font-size:.58rem;letter-spacing:.03em;background:var(--gold);color:var(--gold-text);padding:2px 8px;border-radius:999px}
  .pill.soft{background:rgba(255,255,255,.08);color:var(--muted);font-weight:700}
  .pill.live{background:var(--live);color:#fff;display:inline-flex;align-items:center;gap:4px}
  .pill.live::before{content:"";width:5px;height:5px;border-radius:50%;background:#fff;animation:blink 1.2s infinite}
  @keyframes blink{50%{opacity:.35}}
  .minute{font-family:var(--mono);font-size:.62rem;color:var(--live);font-weight:700}
  .empty{color:var(--muted);text-align:center;padding:24px 6px;font-size:.75rem}

  /* ── mobile: smaller, taller box that fits more rows without scrolling,
     and narrower so the whole card (incl. left flag) stays on-screen ── */
  @media (max-width: 480px) {
    :root{
      /* Slightly narrower than before so the box doesn't run off the
         left edge of the viewport (which was clipping the home-team
         flag). Right edge stays pinned via --xat-right. */
      --pw: clamp(88px, 26vw, 112px);
      --xat-nav: 46px;
      --xat-right: 8px;
    }
    #app{
      /* Taller — sized to comfortably fit ~4-5 rows without an inner
         scrollbar, while still capping to the viewport height. */
      max-height: min(340px, calc(100vh - var(--xat-nav) - 20px));
      border-radius: 10px;
    }
    .tabs{padding:4px 4px 3px;gap:3px}
    .tab{font-size:.48rem;padding:3px 2px}
    .list{padding:2px 4px 4px}
    .match{padding:5px 0}
    .row{gap:2px}
    .team{font-size:.54rem;gap:2px}
    .flag{width:16px;height:16px}
    .flag img{width:150%;height:150%}
    .flag .emoji-fallback{font-size:14px}
    .mid{min-width:38px;gap:2px}
    .score{font-size:.7rem}
    .ko{font-size:.56rem}
    .cd{font-size:.46rem}
    .pill{font-size:.4rem;padding:1px 3px}
    .minute{font-size:.44rem}
  }
  html[data-mobile="1"]{
    --pw: clamp(88px, 26vw, 112px) !important;
    --xat-nav: 46px !important;
    --xat-right: 8px !important;
  }
  html[data-mobile="1"] #app{
    max-height: min(340px, calc(100vh - var(--xat-nav) - 20px)) !important;
    border-radius: 10px !important;
  }
  html[data-mobile="1"] .tabs{padding:4px 4px 3px !important;gap:3px !important}
  html[data-mobile="1"] .tab{font-size:.48rem !important;padding:3px 2px !important}
  html[data-mobile="1"] .list{padding:2px 4px 4px !important}
  html[data-mobile="1"] .match{padding:5px 0 !important}
  html[data-mobile="1"] .row{gap:2px !important}
  html[data-mobile="1"] .team{font-size:.54rem !important;gap:2px !important}
  html[data-mobile="1"] .flag{width:16px !important;height:16px !important}
  html[data-mobile="1"] .flag img{width:150% !important;height:150% !important}
  html[data-mobile="1"] .flag .emoji-fallback{font-size:14px !important}
  html[data-mobile="1"] .mid{min-width:38px !important;gap:2px !important}
  html[data-mobile="1"] .score{font-size:.7rem !important}
  html[data-mobile="1"] .ko{font-size:.56rem !important}
  html[data-mobile="1"] .cd{font-size:.46rem !important}
  html[data-mobile="1"] .pill{font-size:.4rem !important;padding:1px 3px !important}
  html[data-mobile="1"] .minute{font-size:.44rem !important}
</style>
</head>
<body>
<script>
  // "Desktop site" mode in mobile browsers fakes a wide viewport (~980px),
  // which fools plain @media (max-width) queries. screen.width reflects the
  // device's real hardware width regardless of that mode, so we use it as
  // a fallback signal and flag <html> so the CSS above can react to it too.
  (function(){
    try{
      if (window.screen.width <= 480 || window.innerWidth <= 480) {
        document.documentElement.setAttribute('data-mobile', '1');
      }
    }catch(e){}
  })();
</script>
<div id="app">
  <div class="topbar"></div>
  <div class="tabs">
    <button class="tab active" id="tabLive" type="button">

    </button>
  </div>
  <div class="list" id="list"></div>
</div>

, {"id": "400021530", "d": "2026-07-04T17:00:00Z", "g": "", "hc": "CAN", "ac": "MAR"}, {"id": "400021533", "d": "2026-07-04T21:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021532", "d": "2026-07-05T20:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021531", "d": "2026-07-06T00:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021529", "d": "2026-07-06T19:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021534", "d": "2026-07-07T00:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021528", "d": "2026-07-07T16:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021535", "d": "2026-07-07T20:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021536", "d": "2026-07-09T20:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021538", "d": "2026-07-10T19:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021539", "d": "2026-07-11T21:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021537", "d": "2026-07-12T01:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021541", "d": "2026-07-14T19:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021540", "d": "2026-07-15T19:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021542", "d": "2026-07-18T21:00:00Z", "g": "", "hc": "", "ac": ""}, {"id": "400021543", "d": "2026-07-19T19:00:00Z", "g": "", "hc": "", "ac": ""}];

/* =========================================================================
   ROUND OF 16 FALLBACK — known matchups, used only until FIFA's live API
   itself reports the official teams for these fixtures. As soon as the API
   response includes real team data for a match below, that takes priority
   automatically — you should NOT need to keep editing this by hand once
   the tournament reaches that point. If a brand new round (quarterfinals,
   etc.) starts showing as TBD instead of real teams, that means the API
   hasn't published it yet either, and this table needs a manual update.
   ========================================================================= */
const ROUND16_FALLBACK = {
  '400021533': { h:'PAR', a:'FRA' }, // Jul 4
  '400021532': { h:'BRA', a:'NOR' }, // Jul 5
  '400021531': { h:'MEX', a:'ENG' }, // Jul 6
  '400021529': { h:'POR', a:'ESP' }, // Jul 6
  '400021534': { h:'USA', a:'BEL' }, // Jul 7
  '400021528': { h:'ARG', a:'EGY' }, // Jul 7
  '400021535': { h:'SUI', a:'COL' }, // Jul 7
};

/* Resolves the real team code for a match: live API data (if FIFA has
   published it) > the manual fallback table above > blank/unknown (TBD). */
function teamCode(side, m){
  const api = TEAM_CODES[m.id];
  const apiCode = api ? (side === 'h' ? api.h : api.a) : null;
  if(apiCode) return apiCode;
  const staticCode = side === 'h' ? m.hc : m.ac;
  if(staticCode) return staticCode;
  const fb = ROUND16_FALLBACK[m.id];
  return fb ? fb[side] : '';
}

/* =========================================================================
   FALLBACK RESULTS — known finished scores, shown immediately so the list
   is never empty/dashed while the live API call is in flight (or if it's
   unreachable, e.g. blocked by the preview sandbox's network/CORS rules).
   These get overwritten automatically the moment the live API responds.
   ========================================================================= */
const FALLBACK_RESULTS = {
  '400021517': { st: 0, hs: 2, as: 2 }, // COL 2-2 GHA
  '400021521': { st: 0, hs: 7, as: 1 }, // ARG 7-1 CPV
  '400021515': { st: 0, hs: 2, as: 0 }, // AUS 2-0 EGY
  '400021527': { st: 0, hs: 2, as: 0 }, // SUI 2-0 ALG
  '400021526': { st: 0, hs: 2, as: 1 }, // POR 2-1 CRO
  '400021519': { st: 0, hs: 3, as: 0 }, // ESP 3-0 AUT
  '400021524': { st: 0, hs: 2, as: 0 }  // USA 2-0 BIH
};

/* =========================================================================
   LIVE SCORES — pulled from FIFA's public calendar API for this season.
   Starts from FALLBACK_RESULTS, then gets replaced/extended once the API
   call succeeds (fresh scores, real live matches, etc.).
   ========================================================================= */
const API = 'https://api.fifa.com/api/v3';
const ID_SEASON = '285023';
let LIVE = { ...FALLBACK_RESULTS }; // { matchId: { st, hs, as, mt } }  st: 0=finished,1=upcoming,3=live
let TEAM_CODES = {}; // { matchId: { h, a } } — real team codes once FIFA publishes them

// Best-effort extraction of a 3-letter team code from a FIFA API team object.
// The exact field name isn't officially documented, so this tries the most
// likely candidates and quietly gives up if none match (falls back to
// ROUND16_FALLBACK / TBD instead of breaking anything).
function extractCode(team){
  if(!team) return null;
  return team.Abbreviation || team.IdCountry || team.ShortClubName || null;
}

async function loadLiveScores(){
  try{
    const res = await fetch(`${API}/calendar/matches?language=es&count=500&idSeason=${ID_SEASON}`);
    const data = await res.json();
    const live = {};
    const codes = {};
    for(const r of data.Results || []){
      live[r.IdMatch] = { st: Number(r.MatchStatus), hs: r.HomeTeamScore, as: r.AwayTeamScore, mt: r.MatchTime || '' };
      const h = extractCode(r.Home), a = extractCode(r.Away);
      if(h || a) codes[r.IdMatch] = { h, a };
    }
    if(Object.keys(live).length){
      LIVE = { ...FALLBACK_RESULTS, ...live };
      TEAM_CODES = codes;
      render();
    }
  }catch(e){
    // Live API unreachable — silently keep showing the fallback results,
    // no need to alarm the user with an error message.
  }
}

function statusOf(m){
  const lv = LIVE[m.id];
  if(lv && lv.st != null){
    const n = Number(lv.st);
    return Number.isNaN(n) ? -1 : n;
  }
  // No score data for this match: only treat it as "upcoming" if its kickoff
  // is genuinely still ahead of us. Past matches with no data are unknown
  // (not "upcoming") so they don't clutter either list.
  return Date.parse(m.d) > Date.now() ? 1 : -1;
}

function flagEl(code){
  if(!code) return `<span class="flag"><span class="emoji-fallback">❔</span></span>`;
  const emoji = EMOJI_FALLBACK[code] || '❔';
  return `<span class="flag">
      <img src="${FLAG_PATH(code)}" alt="${code}"
           onerror="this.replaceWith(Object.assign(document.createElement('span'),{className:'emoji-fallback',textContent:'${emoji}'}))">
    </span>`;
}

function fmtKickoff(iso){
  return new Intl.DateTimeFormat('es', {hour:'numeric', minute:'2-digit', hour12:true}).format(new Date(iso));
}

function renderLive(){
  const list = document.getElementById('list');
  // Only include matches we actually have a score for (live or finished)
  const pool = FIXTURES.filter(m => m.hc && m.ac && LIVE[m.id] && LIVE[m.id].st !== 1);
  // live matches first, then most recently finished
  pool.sort((a,b) => {
    const sa = statusOf(a) === 3 ? 0 : 1, sb = statusOf(b) === 3 ? 0 : 1;
    if(sa !== sb) return sa - sb;
    return Date.parse(b.d) - Date.parse(a.d);
  });
  const recent = pool.slice(0, 12);
  if(!recent.length){ list.innerHTML = '<div class="empty">Sin resultados por ahora.</div>'; return; }
  list.innerHTML = recent.map(m => {
    const lv = LIVE[m.id];
    const isLive = statusOf(m) === 3;
    const hs = lv && lv.hs != null ? lv.hs : '–';
    const as = lv && lv.as != null ? lv.as : '–';
    const hCode = teamCode('h', m), aCode = teamCode('a', m);
    return `
      <div class="match${isLive ? ' live' : ''}">
        <div class="row">
          <div class="team">${flagEl(hCode)}<span>${hCode}</span></div>
          <div class="mid">
            <div class="score${isLive ? ' live-score' : ''}">${hs} : ${as}</div>
            ${isLive
              ? `<div class="pill live">EN VIVO</div>${lv.mt ? `<div class="minute">${lv.mt}</div>` : ''}`
              : `<div class="pill">Final</div>`}
          </div>
          <div class="team away">${flagEl(aCode)}<span>${aCode}</span></div>
        </div>
      </div>`;
  }).join('');
}

function renderUpcoming(){
  const list = document.getElementById('list');
  // Only show matches where at least one side is known — fully blank
  // "TBD vs TBD" placeholders (rounds that haven't taken shape yet) are
  // hidden automatically, and reappear on their own once a team is
  // resolved (via the live API or a fallback table entry).
  const pool = FIXTURES.filter(m => {
    if(statusOf(m) !== 1) return false;
    return teamCode('h', m) || teamCode('a', m);
  });
  pool.sort((a,b) => Date.parse(a.d) - Date.parse(b.d));
  const next = pool.slice(0, 12);
  if(!next.length){ list.innerHTML = '<div class="empty">No hay próximos partidos.</div>'; return; }
  list.innerHTML = next.map(m => {
    const hCode = teamCode('h', m), aCode = teamCode('a', m);
    return `
    <div class="match">
      <div class="row">
        <div class="team">${flagEl(hCode)}<span>${hCode || 'TBD'}</span></div>
        <div class="mid">
          <div class="ko">${fmtKickoff(m.d)}</div>
          <div class="cd" data-k="${Date.parse(m.d)}"></div>
        </div>
        <div class="team away">${flagEl(aCode)}<span>${aCode || 'TBD'}</span></div>
      </div>
    </div>`;
  }).join('');
  tickCountdowns();
}

// Updates every ".cd[data-k]" element with a compact live countdown
// (no "Empieza en" label — just the number, kept short so it always fits).
function tickCountdowns(){
  const now = Date.now();
  document.querySelectorAll('.cd[data-k]').forEach(el => {
    const diff = Number(el.dataset.k) - now;
    if(diff <= 0){ el.textContent = ''; return; }
    const dd = Math.floor(diff / 86400000);
    const hh = Math.floor(diff % 86400000 / 3600000);
    const mm = Math.floor(diff % 3600000 / 60000);
    const ss = Math.floor(diff % 60000 / 1000);
    if(dd > 0)      el.textContent = `${dd}d ${hh}h`;
    else if(hh > 0) el.textContent = `${hh}h ${String(mm).padStart(2,'0')}m`;
    else            el.textContent = `${String(mm).padStart(2,'0')}:${String(ss).padStart(2,'0')}`;
  });
}

const tabLive = document.getElementById('tabLive');
const tabUpcoming = document.getElementById('tabUpcoming');
let currentTab = 'live';

function render(){ currentTab === 'live' ? renderLive() : renderUpcoming(); }

tabLive.addEventListener('click', () => {
  currentTab = 'live';
  tabLive.classList.add('active');
  tabUpcoming.classList.remove('active');
  render();
});
tabUpcoming.addEventListener('click', () => {
  currentTab = 'upcoming';
  tabUpcoming.classList.add('active');
  tabLive.classList.remove('active');
  render();
});

render();
loadLiveScores();
setInterval(loadLiveScores, 60000); // refresh scores every minute
setInterval(tickCountdowns, 1000);  // keep "Empieza en" timers ticking
</script>
